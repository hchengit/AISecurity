name: CI

on:
  push:
    branches: [main]
    paths:
      - 'SecurityCore/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'SecurityCore/**'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SecurityCore
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libsqlite3-dev pkg-config clang libclang-dev llvm-dev libpam0g-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            SecurityCore/target
          key: linux-cargo-${{ hashFiles('SecurityCore/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Run tests
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release -p security-linux

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SecurityCore
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libsqlite3-dev pkg-config clang libclang-dev llvm-dev libpam0g-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            SecurityCore/target
          key: clippy-cargo-${{ hashFiles('SecurityCore/Cargo.lock') }}
          restore-keys: clippy-cargo-

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  supply-chain:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SecurityCore
    steps:
      - uses: actions/checkout@v4

      # cargo-deny's `advisories` check is the RustSec/cargo-audit engine;
      # `bans` surfaces duplicate deps and `sources` pins crates to crates.io.
      # Accepted advisories with no in-semver fix are documented in deny.toml.
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny (advisories, bans, sources)
        run: cargo deny check advisories bans sources
