# Supply-chain policy for `cargo deny` — enforced in CI.
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# The audit gate FAILS on any RustSec advisory not explicitly ignored below.
# Each ignore has a reason and no in-semver fix today; NEW advisories are not
# ignored and will fail CI. Re-audit and prune this list as fixes land.

[advisories]
ignore = [
  { id = "RUSTSEC-2021-0139", reason = "ansi_term: unmaintained/unsound transitive dep, no fixed version available" },
  { id = "RUSTSEC-2023-0040", reason = "users: unmaintained/unsound transitive dep, no fixed version available" },
  { id = "RUSTSEC-2024-0375", reason = "atty: unmaintained/unsound transitive dep, no fixed version available" },
  { id = "RUSTSEC-2024-0436", reason = "paste: unmaintained/unsound transitive dep, no fixed version available" },
  { id = "RUSTSEC-2025-0040", reason = "users: unmaintained/unsound transitive dep, no fixed version available" },
  { id = "RUSTSEC-2026-0097", reason = "rand: unmaintained/unsound transitive dep, no fixed version available" },
  { id = "RUSTSEC-2026-0194", reason = "fix needs quick-xml 0.41, blocked by a transitive parent constraint" },
  { id = "RUSTSEC-2026-0195", reason = "fix needs quick-xml 0.41, blocked by a transitive parent constraint" },
]

[bans]
# Duplicate crate versions are common transitively — surface, don't block.
# (Hard build-breaking conflicts like duplicate `links` are caught by cargo build.)
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Dependencies must come from crates.io — no unknown registries or git sources.
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
# License compliance is a separate concern from security; CI runs only
# `check advisories bans sources`. Permissive allow-list kept for completeness.
allow = [
  "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib", "MPL-2.0",
  "Unicode-3.0", "Unicode-DFS-2016", "CC0-1.0", "Unlicense", "0BSD",
]
